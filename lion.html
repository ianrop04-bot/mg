<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:image" content="" />
    <meta property="og:title" content="SPIDERMAN-MD-BOT" />
  <meta property="og:description" content="Spiderman WhatsApp free Bot Lite" />
  <script src="index.js"></script>
  <title>SPIDERMAN-MD</title>
</head>
<style>
  * {
    margin: 0;
    padding: 0;
    font-family: 'Rajdhani', monospace;
  }
  
  body {
    font-size: 16px;
    background: #080808;
    color: white;
  }
  
  header {
    position: sticky;
    background: #32333B;
    padding: 20px;
    display: flex;
    color: red;
  }
  
  span {
    color: #0088FF;
  }
  
  button {
    padding: 14px;
    margin: 10px;
    background: #0088FF;
    color: white;
    border-radius: 15px;
    font-size: 17px;
    font-weight: 700;
    border: none;
    width: 50%;
  }
  
  #follow {
    position: absolute;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    top: 10px;
    right: 5px;
    border: none;
    width: 30%;
  }
  
  button:active {
    transform: scale(0px, 10px);
    background: #077E92;
  }
  
  input {
    padding: 20px;
    margin: 10px;
    border: 1px solid #FF0606;
    border-radius: 15px;
    outline-color: #CD0202;
    font-size: 18px;
    color: #00D9FF;
    background:#2428296B;
  }
  
  .sec {
    padding: 20px;
    margin: 10px;
    border: 2px solid #FF0000;
    border-radius: 10px;
    background:#00CAFF2B;
    backdrop-filter: blur(10px);
    z-index:1;
  }
  
  .msgerror {
    background: #FF000057;
    backdrop-filter: blur(10px);
    color: white;
    padding: 8px;
    margin: 5px;
    border:1px solid #FF0000;
    border-radius: 10px;
    display: block;
  }
  #bg-canvas{
    position:fixed;
    z-index:-1;
  }
  .logo {
    width: 30px;
    height: 30px;
    border-radius: 5px;
    background: #FF00002B;
    border: 2px solid #FF0000;
  }
  .msgsuccess{
    background: #00FF2826;
backdrop-filter: blur(10px);
color: white;
padding: 8px;
margin: 5px;
border:1.5px solid #00FF28;
border-radius: 10px;
display: block;
  }
  header h1 {
    position: absolute;
    top: 23px;
    left: 54px;
    font-weight:900;
  }
  #codeBox{
    padding:20px;
    margin:10px;border:2px dashed #00A5FF;
    text-align: center;
  }
  #codes{
    color:#FF0000;
    font-family:sans-serif;
    font-weight:700;
    
  }
</style>

<body>
  <canvas id="bg-canvas">
    
  </canvas>
  <header>
    <div class="logo">
      <b class="fas-faweb"></b>
    </div>
    <h1>SPIDER<span>-MD</span></h1>
    <button id="follow"><b class="fas-fawhatsapp"></b>Channel</button>
  </header>
  <div class="sec">
    
    <p>Create Account, Place your WhatsApp number</p>
    <input type="number" placeholder="254×××××××××" id="num">
    <p id="error"></p>
    <button id="generate">Generate Code <div id="loader"></div></button>
    <br />
    <div id="codeBox">
      <h3 id="codes">---- ----</h3>
      <b>Tap to copy</b>
    </div>
  </div>
  <script>
    const btn = $('generate')
    const codes = $('codes').textContent;
    const codeBox = $('codeBox')
    
    
    function msg(text, role) {
      const msg = $('error');
      msg.style.display = 'block';
      msg.className = `msg` + role;
      msg.textContent = text
      setTimeout(() => {
        msg.style.display = 'none';
      }, 2500)
    }
    
    btn.addEventListener('click', async () => {
      let phone = $('num').value;
      if (!phone) {
        msg('WhatsAppnumber Please', 'error');
        return
      }
      btn.innerHTML = '⏳Pairing...'
      try {
        const response = await fetch('https://cors-anywhere.herokuapp.com/http://node23.lunes.host:3281/pair?phone='+phone);
        const data = await response.json();
        if (data.ok) {
          $('codeBox').style.display = 'block';
          codes.innerHTML = data.code
        }
        // Tab to edit
      } catch (error) {
        msg(error.message, 'error')
      } finally {
        btn.innerHTML = 'Generate Code'
      }
    })
    $('follow').addEventListener('click', () => {
      window.open('https://whatsapp.com/channel/0029Vb71mgIElaglZCU0je0x')
    })
    codeBox.addEventListener('click', () => {
      
      navigator.clipboard.writeText(codes).then(() => { msg('Copied !','success') })
    })
    
    
    
    const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize); 
    const letters = 'NEXGEN HUB 01';
const fontSize = 16;
let columns = Math.floor(canvas.width / fontSize);
let drops = Array(columns).fill(0);

function draw() {
  ctx.fillStyle = 'rgba(15, 17, 21, 0.1)'; 
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  ctx.fillStyle = '#38bdf8'; 
  ctx.font = fontSize + 'px monospace';
  
  
  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
  requestAnimationFrame(draw);
}
draw();
  </script>
</body>

</html>
